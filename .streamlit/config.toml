# Streamlit configuration (safe to commit — contains NO secrets).
# Secrets (DATABASE_URL, auth credentials) live in .streamlit/secrets.toml,
# which is gitignored. On Streamlit Cloud, set them in the app's Secrets UI.

[server]
headless = true
enableXsrfProtection = true
# NOTE: do NOT set `port` here. Streamlit Community Cloud serves the app on
# :8501 and health-checks that port; a committed `port = 8504` makes the app
# bind the wrong port on the cloud → the health check gets connection-refused
# → "Oh no. Error running app" with NO traceback (the app is actually fine,
# just on the wrong port). The local run sets its port via the CLI flag in
# run_terminal.bat (`--server.port 8504`), which overrides config anyway, so
# nothing local depends on this line.

[browser]
gatherUsageStats = false

# Dark "terminal" theme matching main_app.py's palette.
[theme]
base = "dark"
primaryColor = "#6c8eff"
backgroundColor = "#080e1d"
secondaryBackgroundColor = "#0f1830"
textColor = "#e0e5fb"
font = "monospace"
